<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Troncales — Gestión de Viajes</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-logo">
        <h1 class="brand-name">TRONCALES</h1>
        <p class="brand-subtitle">Gestión de Viajes</p>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required
                 autocomplete="username" placeholder="usuario@empresa.com">
        </div>
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" required
                 autocomplete="current-password">
        </div>
        <div id="errorMsg" class="error-msg" style="display:none"></div>
        <button type="submit" id="btnLogin" class="btn btn-primary btn-full">
          Ingresar
        </button>
      </form>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
