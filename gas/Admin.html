<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Troncales — Usuarios</title>
  <?!= include('global.css'); ?>
  <?!= include('dashboard.css'); ?>
  <?!= include('admin.css'); ?>
</head>
<body>
<div class="app-layout">

  <!-- SIDEBAR -->
  <nav class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-name">Troncales</div>
      <div class="brand-sub">Administración</div>
    </div>
    <div class="sidebar-nav">
      <div class="nav-section-label">Navegación</div>
      <button class="nav-item" id="btnBackDashboard">
        <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
        <span>Volver al Dashboard</span>
      </button>
    </div>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="sidebarAvatar">?</div>
        <div class="user-details">
          <div class="user-name" id="sidebarUserName">Admin</div>
          <div class="user-role" id="sidebarUserRole">Admin General</div>
        </div>
      </div>
      <button class="btn btn-ghost btn-sm w-100" id="logoutBtn">Cerrar sesión</button>
    </div>
  </nav>

  <!-- MAIN -->
  <main class="main-content">
    <header class="page-header">
      <h1>Gestión de Usuarios</h1>
      <button class="btn btn-primary btn-sm" id="btnNuevoUsuario">+ Nuevo Usuario</button>
    </header>

    <div class="page-body">
      <div class="card">
        <div class="admin-toolbar">
          <div class="admin-search">
            <span class="search-icon">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            </span>
            <input type="text" id="userSearch" class="form-control" placeholder="Buscar por nombre o email...">
          </div>
          <button class="btn btn-secondary btn-sm" onclick="cargarUsuarios()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
            Actualizar
          </button>
        </div>

        <div id="usersLoader" class="d-none text-center" style="padding:20px">
          <span class="spinner" style="border-top-color:var(--color-primary)"></span>
          <span class="text-muted" style="margin-left:8px">Cargando usuarios...</span>
        </div>

        <div class="table-responsive">
          <table class="data-table users-table">
            <thead>
              <tr>
                <th>Nombre</th>
                <th>Email</th>
                <th>Rol</th>
                <th>Estado</th>
                <th style="text-align:right">Acciones</th>
              </tr>
            </thead>
            <tbody id="usersTableBody">
              <tr><td colspan="5" class="text-center text-muted" style="padding:20px">Cargando...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Modal Nuevo Usuario -->
<div class="modal-overlay" id="modalNuevo">
  <div class="modal user-modal">
    <div class="modal-title">Nuevo Usuario</div>
    <form id="formNuevoUsuario" novalidate>
      <div class="form-group">
        <label class="form-label">Nombre Completo *</label>
        <input type="text" id="nuevoNombre" class="form-control" placeholder="Nombre y apellido" required>
      </div>
      <div class="form-group">
        <label class="form-label">Email *</label>
        <input type="email" id="nuevoEmail" class="form-control" placeholder="usuario@empresa.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Contraseña *</label>
        <input type="password" id="nuevoPassword" class="form-control" placeholder="Mínimo 6 caracteres" required>
      </div>
      <div class="form-group">
        <label class="form-label">Rol *</label>
        <select id="nuevoRol" class="form-control" required>
          <option value="">-- Seleccionar Rol --</option>
          <option value="ADMIN_GENERAL">ADMIN_GENERAL</option>
          <option value="ADMIN_TRAFICO">ADMIN_TRAFICO</option>
          <option value="OPERACION_TRAFICO">OPERACION_TRAFICO</option>
        </select>
      </div>
      <div id="alertNuevo" class="d-none"></div>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" onclick="cerrarModales()">Cancelar</button>
        <button type="submit" id="btnGuardarNuevo" class="btn btn-primary">Crear Usuario</button>
      </div>
    </form>
  </div>
</div>

<!-- Modal Editar Usuario -->
<div class="modal-overlay" id="modalEditar">
  <div class="modal user-modal">
    <div class="modal-title">Editar Usuario</div>
    <form id="formEditarUsuario" novalidate>
      <input type="hidden" id="editEmailHidden">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="text" id="editEmail" class="form-control" readonly>
      </div>
      <div class="form-group">
        <label class="form-label">Nombre Completo *</label>
        <input type="text" id="editNombre" class="form-control" required>
      </div>
      <div class="form-group">
        <label class="form-label">Rol *</label>
        <select id="editRol" class="form-control" required>
          <option value="ADMIN_GENERAL">ADMIN_GENERAL</option>
          <option value="ADMIN_TRAFICO">ADMIN_TRAFICO</option>
          <option value="OPERACION_TRAFICO">OPERACION_TRAFICO</option>
        </select>
      </div>
      <div id="alertEditar" class="d-none"></div>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" onclick="cerrarModales()">Cancelar</button>
        <button type="submit" id="btnGuardarEditar" class="btn btn-primary">Guardar Cambios</button>
      </div>
    </form>
  </div>
</div>

<script id="sessionData" type="application/json"><?!= session ?></script>

</body>
</html>
