<style>
  .login-wrapper {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--color-background);
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(0,73,147,0.25) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(1,254,255,0.08) 0%, transparent 50%);
    padding: 20px;
  }

  .login-box {
    width: 100%;
    max-width: 400px;
    animation: fadeUp 0.4s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .login-brand {
    text-align: center;
    margin-bottom: 28px;
  }

  .login-brand-logo {
    width: 56px;
    height: 56px;
    margin: 0 auto 14px;
    background: var(--color-primary);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .login-brand-logo svg {
    width: 32px;
    height: 32px;
    fill: var(--color-black);
  }

  .login-brand h1 {
    font-size: 26px;
    font-weight: 800;
    color: var(--color-primary);
    letter-spacing: -0.5px;
  }

  .login-brand p {
    font-size: 13px;
    color: var(--color-text-muted);
    margin-top: 4px;
  }

  .login-card {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: 10px;
    padding: 30px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
  }

  .login-card h2 {
    font-size: 17px;
    font-weight: 700;
    color: var(--color-white);
    margin-bottom: 22px;
  }

  .login-form .form-group { margin-bottom: 16px; }

  .login-btn {
    width: 100%;
    margin-top: 8px;
    padding: 11px;
    font-size: 14px;
    justify-content: center;
  }

  .login-error {
    margin-top: 14px;
    display: none;
  }
  .login-error.visible { display: flex; }

  .login-footer {
    text-align: center;
    margin-top: 20px;
    font-size: 12px;
    color: var(--color-text-muted);
  }
</style>
